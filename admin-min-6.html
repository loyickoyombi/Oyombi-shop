<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Nunito',sans-serif;background:#0a0d14;color:#fff}
#root{min-height:100vh}

#splash{

}
#to-shop:hover{border-color:#FF6B35;color:#FF6B35}

<script>
const { useState, useEffect, useRef } = React;

window.storage = {
async get(key) {
try { const v = localStorage.getItem('oy::'+key); return v ? {key, value:v} : null; }
catch(e) { return null; }
},
async set(key, value) {
try {
const v = typeof value === 'string' ? value : JSON.stringify(value);
localStorage.setItem('oy::'+key, v); return {key, value:v};
} catch(e) { return null; }
},
async delete(key) {
try { localStorage.removeItem('oy::'+key); return {key, deleted:true}; }
catch(e) { return null; }
},
async list(prefix) {
try {
const keys = Object.keys(localStorage)
.filter(k => k.startsWith('oy::'+(prefix||'')))
.map(k => k.replace('oy::',''));
return {keys};
} catch(e) { return {keys:[]}; }
}
};
