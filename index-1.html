*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Nunito',sans-serif;background:#0a0d14;color:#fff;overflow-x:hidden}
#root{min-height:100vh}
#splash{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#0d3d4f 0%,#0a0d14 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.6s ease}

#splash .ico{font-size:72px;margin-bottom:16px;animation:pulse 1.5s ease-in-out infinite}

#splash p{font-size:13px;color:#9CA3AF;letter-spacing:2px}

#splash .fill{height:100%;background:linear-gradient(90deg,#FF6B35,#ff9a70);border-radius:4px;animation:load 2s ease forwards}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes load{from{width:0}to{width:100%}}
#to-admin{position:fixed;top:16px;right:16px;z-index:500;background:#111827;border:1.5px solid #1f2937;border-radius:12px;padding:8px 14px;color:#6B7280;font-size:12px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;text-decoration:none}
